[transport]
protocol = mqtt
# webinterface: enable browser dashboard WebSocket server (true/false)
webinterface = true

[connection]
host = broker.hivemq.com
port = 1883

[mqtt]
topic = sensors/accel
client_id = gaccelserver-subscriber
username =
password =
qos = 1
keepalive = 60

# Last Will and Testament: published automatically by the broker when
# the client disconnects unexpectedly.
# will_topic defaults to "<mqtt.topic>/status" when left blank.
will_topic =
will_payload = {"status":"offline"}
will_qos = 1
will_retain = false

[storage]
output =
store_path =
buffer_capacity = 512
flush_interval_ms = 500
# CSV column separator (default: ;)
csv_separator = ;

[logging]
file = stderr
also_stderr = true
level = INFO

[web]
# Explicit flag mirrors [transport] webinterface for the [web] section.
enabled = true
host = 0.0.0.0
port = 8089
stats_interval_ms = 500

[device]
model = BMI160
range_g = 16.0

[validator]
timesource = external
max_acc_ms2 = 0
seq_optional = false
