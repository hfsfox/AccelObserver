# gaccelserver.conf — accelerometer data subscriber server configuration.
#
# Search order (first file found wins):
#   ./gaccelserver.conf
#   ~/.config/gaccelserver/gaccelserver.conf
#   /etc/gaccelserver/gaccelserver.conf
# Override any key with the equivalent CLI flag (see --help).

[transport]
# Protocol: ws (WebSocket server) or mqtt (MQTT subscriber).
protocol = mqtt

# Enable the real-time browser dashboard (WebSocket + HTTP server).
# Browse to http://<host>:<web.port>/ after starting the server.
webinterface = true

[connection]
# MQTT broker hostname or IP (mqtt mode) / bind address (ws mode).
host = broker.hivemq.com
# Broker port for mqtt (1883 plain, 8883 TLS), listen port for ws.
port = 1883

[mqtt]
topic      = sensors/accel
client_id  = data-subscriber
username   =
password   =
# QoS: 0 = fire-and-forget, 1 = at-least-once, 2 = exactly-once.
qos        = 1
keepalive  = 60

# Last Will and Testament — published by the broker on unexpected disconnect.
# will_topic defaults to "<topic>/status" when left empty.
will_topic   =
will_payload = {"status":"offline"}
will_qos     = 1
will_retain  = false

[storage]
# Exact CSV output path; leave empty to auto-generate a timestamped filename.
output           =
# Directory for auto-generated files (created automatically if absent).
store_path       =
buffer_capacity  = 512
flush_interval_ms = 500
# Column separator written between CSV fields (default ;).
csv_separator    = ;

[logging]
# Destination: stderr | stdout | default | /absolute/path/to/file
file         = stderr
also_stderr  = true
level        = INFO

[web]
# Bind address for the dashboard WebSocket / HTTP server.
host              = 0.0.0.0
port              = 8088
stats_interval_ms = 1000

[device]
# Pre-defined profiles: BMI160 | MPU6050 | ADXL345 | generic
model   = BMI160
range_g = 16.0

[validator]
# timesource: external = ts mandatory in every packet;
#             host     = server clock used when ts is absent or zero.
# Set host when receiving from Android Sensor Server (no Unix epoch ts).
timesource   = external
# 0 = derive from device.range_g * 9.80665
max_acc_ms2  = 0
seq_optional = false
